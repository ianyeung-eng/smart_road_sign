<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>智能路牌控制</title>
  <style>
    :root {
      --primary: #007bff;
      --success: #28a745;
      --danger: #dc3545;
      --bg: #f8f9fa;
      --panel-bg: #ffffff;
      --dark-panel: #1a1a1a;
      --accent: #ffeb3b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #2d3748;
      margin: 0;
      padding: 15px;
      display: flex; flex-direction: column; align-items: center;
    }

    .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 15px; }

    h1 { text-align: center; color: #333; font-size: 1.5rem; margin: 10px 0; }

    .panel {
      background: var(--panel-bg);
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .panel h3 {
      margin-top: 0; font-size: 1.1rem; border-left: 4px solid var(--primary);
      padding-left: 10px; margin-bottom: 15px;
    }

    #status {
      padding: 12px; margin-bottom: 15px; border-radius: 8px; text-align: center;
      font-weight: bold; background: #e9ecef; color: #6c757d; font-family: 'Courier New', monospace;
    }
    #status.success { background: #d4edda; color: #155724; border: 1px solid var(--success); }
    #status.error { background: #f8d7da; color: #721c24; border: 1px solid var(--danger); }
    #status.wait { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

    #connect-btn {
      width: 100%; padding: 15px; font-size: 1rem; font-weight: bold;
      background: var(--primary); color: white; border: none; border-radius: 8px;
      cursor: pointer; margin-bottom: 10px;
    }
    #connect-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .sub-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }

    button.nav-btn {
      padding: 14px 10px; font-size: 0.95rem; background: #fff; border: 1px solid #ddd;
      border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.2s;
    }
    button.nav-btn:active { background: #f0f0f0; transform: scale(0.98); }
    button.nav-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #eee !important; }
    
    button.action-btn { background: #f8f9fa; border: 1px solid var(--primary); color: var(--primary); }
    button.danger-btn { background: #fff5f5; border: 1px solid var(--danger); color: var(--danger); }

    .back-btn { width: 100%; margin-top: 15px; background: #6c757d !important; color: white !important; border: none !important; }

    .info-display {
      background: var(--dark-panel); color: #00ff00; padding: 15px; border-radius: 8px;
      font-family: 'Courier New', monospace; margin-top: 10px; line-height: 1.6; min-height: 100px;
      font-size: 0.9rem;
    }

    img { width: 100%; height: auto; border-radius: 6px; margin-top: 10px; border: 1px solid #444; }
    .hidden { display: none; }
    footer { text-align: center; margin: 20px 0; color: #999; font-size: 0.8rem; }
    
    .live-dot {
      display: inline-block; width: 8px; height: 8px; background: #ff0000;
      border-radius: 50%; margin-right: 5px; animation: blink 1s infinite;
    }
    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
  </style>
</head>
<body>

<div class="container">
  <h1>CITY SMART 控制終端</h1>

  <div class="panel">
    <h3>1. 系統狀態</h3>
    <button id="connect-btn">連接 micro:bit 藍牙</button>
    <div id="status">尚未連接</div>
  </div>

  <div id="main-menu" class="panel">
    <h3>2. 功能選擇</h3>
    <div class="grid-menu">
      <button class="nav-btn cmd-lock" onclick="showSection('weather')">🌤 實時天氣 (每秒更新)</button>
      <button class="nav-btn cmd-lock" onclick="showSection('destination')">📍 目的地導航</button>
      <button id="emergency-btn" class="nav-btn danger-btn cmd-lock" style="grid-column: span 2;" onclick="triggerEmergency()">⚠️ 意外狀況</button>
    </div>
  </div>

  <div id="weather" class="panel hidden">
    <h3><span class="live-dot"></span>天文台實時監控</h3>
    <div id="weather-info" class="info-display">> 正在初始化實時數據...</div>
    <button class="nav-btn back-btn" onclick="backToMain()">停止監控並返回</button>
  </div>

  <div id="emergency-panel" class="panel hidden">
    <h3>⚠️ 緊急事故警告</h3>
    <div id="emergency-info" class="info-display" style="color: #ff4d4d; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 10px;">
      XX街發生嚴重交通意外，道路受阻。
    </div>
    <button class="nav-btn back-btn" onclick="backToMain()">清除警告並返回</button>
  </div>

  <div id="destination" class="panel hidden">
    <h3>目的地導航</h3>
    <div class="grid-menu" style="grid-template-columns: repeat(3, 1fr);">
      <button class="nav-btn cmd-lock" onclick="showSubSection('shopping')">購物</button>
      <button class="nav-btn cmd-lock" onclick="showSubSection('dining')">飲食</button>
      <button class="nav-btn cmd-lock" onclick="showSubSection('transport')">交通</button>
      <button class="nav-btn cmd-lock" onclick="showSubSection('toilet')">廁所</button>
      <button class="nav-btn cmd-lock" style="grid-column: span 2;" onclick="showSubSection('landmark')">地標</button>
    </div>

    <div id="sub-sections" style="margin-top: 15px;">
      <div id="shopping" class="sub-menu hidden">
        <button class="nav-btn action-btn cmd-lock" onclick="send('265')">XX商場</button>
      </div>
      <div id="dining" class="sub-menu hidden">
        <button class="nav-btn action-btn cmd-lock" onclick="send('100')">XX茶餐廳</button>
      </div>
      <div id="transport" class="sub-menu hidden">
        <button class="nav-btn action-btn cmd-lock" onclick="send('0')">XX巴士站</button>
        <button class="nav-btn action-btn cmd-lock" onclick="send('135')">XX地鐵站</button>
      </div>
      <div id="toilet" class="sub-menu hidden">
        <button class="nav-btn action-btn cmd-lock" onclick="send('80')">XX公共廁所</button>
      </div>
      <div id="landmark" class="sub-menu hidden">
        <button class="nav-btn action-btn cmd-lock" onclick="send('75')">XX博物館</button>
        <button class="nav-btn action-btn cmd-lock" onclick="send('150')">XX廟</button>
        <button class="nav-btn action-btn cmd-lock" onclick="send('140')">XX公園</button>
      </div>
    </div>
    <button class="nav-btn back-btn" onclick="backToMain()">返回主選單</button>
  </div>

  <div id="map" class="panel">
    <h3>3. 位置概覽</h3>
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiNqNyS70wCMR6H3vJ0Cakza0aZEDTCYUrvvZCDywmvpxLvcMQwJP_xArbNkcC-qu7PEw9b1BUO9fyaIunSG-6iAHcrL3Z7WrPfJM6fwrWBHT7dXTsKteiH3BEB3ZFxUfXx8EKIV910KArrkbaNnBq1_57OjO7pAO_kPMMV2nwY7jM3evHm4KwIBv5Ppl8/s882/%E8%9E%A2%E5%B9%95%E6%88%AA%E5%9C%96%202026-02-09%20%E4%B8%8B%E5%8D%8812.05.44.png" alt="Map">
  </div>

  <footer>終端版本 v3.0-CLEAN • 2026 發明比賽</footer>
</div>

<script>
const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const UART_RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let device = null;
let rxChar = null;
let weatherTimer = null;
let isLocked = false;
let cachedTemp = "--";
let cachedHumidity = "--";

const statusEl = document.getElementById("status");
const connectBtn = document.getElementById("connect-btn");

function playAlarmSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sawtooth';
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.5);
  } catch (e) { console.warn("音訊播放受限", e); }
}

function setStatus(msg, type = "") {
  statusEl.textContent = msg;
  statusEl.className = type;
}

function toggleButtons(disabled) {
  const buttons = document.querySelectorAll('.cmd-lock');
  buttons.forEach(btn => btn.disabled = disabled);
}

function startCooldown() {
  isLocked = true;
  toggleButtons(true);
  let timeLeft = 5;
  const timer = setInterval(() => {
    timeLeft--;
    if (timeLeft > 0) {
      setStatus(`⏳ 指令處理中... (${timeLeft}s)`, "wait");
    } else {
      clearInterval(timer);
      isLocked = false;
      toggleButtons(false);
      if (rxChar) setStatus("✅ 系統就緒", "success");
    }
  }, 1000);
}

function onDisconnected() {
  setStatus("⚠️ 已中斷連線，請重新連接", "error");
  connectBtn.textContent = "重新連接 micro:bit";
  connectBtn.disabled = false;
  rxChar = null;
  device = null;
}

async function connectBluetooth() {
  try {
    setStatus("正在搜尋 micro:bit...", "");
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: [UART_SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(UART_SERVICE_UUID);
    rxChar = await service.getCharacteristic(UART_RX_UUID);
    setStatus("✅ 已連線", "success");
    connectBtn.textContent = "裝置已就緒";
    connectBtn.disabled = true;
  } catch (err) { setStatus("❌ 連接失敗", "error"); }
}

async function send(message) {
  if (!rxChar || isLocked) return;

  try {
    // 增加至 150ms 延遲，極大化穩定性
    await new Promise(r => setTimeout(r, 150));
    
    // 強制清潔字串內容
    const cleanMsg = String(message).trim() + "\n";
    await rxChar.writeValue(new TextEncoder().encode(cleanMsg));
    
    setStatus("📡 已發送指令: " + message, "success");
    startCooldown(); 
  } catch (err) { setStatus("❌ 發送失敗", "error"); }
}

function triggerEmergency() {
  if (isLocked) return;
  playAlarmSound();
  send("25"); // 發送意外代碼
  showSection('emergency-panel');
}

async function updateWeatherLive() {
  const weatherInfo = document.getElementById("weather-info");
  if (new Date().getSeconds() === 0 || cachedTemp === "--") {
    try {
      const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
      const data = await response.json();
      cachedTemp = data.temperature.data.find(item => item.place === '香港天文台').value;
      cachedHumidity = data.humidity.data[0].value;
    } catch (e) { console.error("API Error"); }
  }
  const timeStr = new Date().toLocaleTimeString('zh-HK', { hour12: false });
  weatherInfo.innerHTML = `> STATUS: STREAMING LIVE<br>> TIME: ${timeStr}<br>> TEMP: ${cachedTemp}°C<br>> HUMIDITY: ${cachedHumidity}%`;
}

function showSection(id) {
  ['weather', 'destination', 'emergency-panel', 'main-menu'].forEach(s => {
    const el = document.getElementById(s);
    if(el) el.classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
  if (id === 'weather') {
    updateWeatherLive();
    weatherTimer = setInterval(updateWeatherLive, 1000); 
  } else { clearInterval(weatherTimer); }
}

function showSubSection(subId) {
  ['shopping', 'dining', 'transport', 'toilet', 'landmark'].forEach(s => {
    const el = document.getElementById(s);
    if(el) el.classList.add("hidden");
  });
  document.getElementById(subId).classList.remove("hidden");
}

function backToMain() { showSection('main-menu'); }

connectBtn.addEventListener("click", connectBluetooth);
</script>

</body>
</html>
